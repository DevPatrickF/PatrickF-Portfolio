<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="imagens/iconeportfolio.jpg">
    <title>Contato</title>
</head>
<body>

    <section class="container">
    <form id="formContato">
        <h1>Formulario de Contato</h1>
        <p>Sera um prazer o seu contato, preencha o formulario e entre em contato comigo.</p>
      
      <label for="nome">Nome: </label>
      <input type="text" id="nome" placeholder="Digite seu nome aqui...." required>
      <br><br>
      <label for="email">Email: </label>
      <input type="email" id="email" placeholder="Digite seu email aqui...." required>
      <br><br>
      <label for="telefone">Telefone: </label>
      <input type="tel" id="telefone" placeholder="Digite seu telefone aqui...." required>
      <br><br>
       <label>Mensagem:</label><br>
      <textarea id="mensagem1" rows="5" placeholder="Digite sua mensagem" required></textarea>
      
    <br>
    <button type="submit" id="enviar-contato">Enviar</button>
    <button type="button" id="voltar-pagina" onclick="window.location.href='index.html'">Voltar à Página Principal</button>
    <button type="reset" id="limpar-form">Limpar Formulario</button>
    </form>
</section>
  <div class="tech-stack-bg">
  <img src="imagens/Python.webp" class="icon p1" alt="Python">
  <img src="imagens/fastapi.webp" class="icon p2" alt="FastAPI">
  <img src="imagens/aws1.png" class="icon p3" alt="AWS">
  <img src="imagens/JavaScript.svg" class="icon p4" alt="JavaScript">
  <img src="imagens/mysql1.png" class="icon p6" alt="mysql">
</div>
<script src="script.js"></script>
</body>
</html>
